<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Cortex</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg:#080B14; --surface:#0E1220;
      --card:rgba(255,255,255,.044); --border:rgba(255,255,255,.08);
      --text:#EDF2FF; --muted:#6B7A99;
      --accent:#7C6EFA; --blue:#5AAFFF;
      --danger:#FF4D6D; --ok:#34D399; --warn:#FBBF24;
      --r:16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
      min-height:100vh;overflow-x:hidden;padding-bottom:72px;
    }
    body::before{
      content:"";position:fixed;inset:0;
      background:radial-gradient(600px at 10% -10%,rgba(124,110,250,.15),transparent 60%),
                 radial-gradient(500px at 90% -5%, rgba(90,175,255,.12),transparent 60%),
                 radial-gradient(700px at 50% 110%,rgba(124,110,250,.08),transparent 60%);
      pointer-events:none;z-index:0;
    }

    /* ── Header ── */
    .hdr{
      position:sticky;top:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 16px;
      background:rgba(8,11,20,.8);border-bottom:1px solid var(--border);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    }
    .logo{
      font-size:19px;font-weight:900;letter-spacing:-.5px;
      background:linear-gradient(120deg,#A78BFA,#60A5FA);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .hdr-right{display:flex;gap:8px;align-items:center}
    .sdot{
      width:8px;height:8px;border-radius:50%;
      background:var(--danger);box-shadow:0 0 8px var(--danger);
      transition:.3s;flex-shrink:0;
    }
    .sdot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
    .stxt{font-size:11px;font-weight:600;color:var(--muted)}
    .ibtn{
      width:34px;height:34px;border-radius:10px;
      border:1px solid var(--border);background:var(--card);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;color:var(--muted);transition:.15s;
    }
    .ibtn:active{transform:scale(.93);background:rgba(255,255,255,.09)}
    .ibtn svg{width:15px;height:15px}

    /* ── Pages / Tabs ── */
    .page{display:none;padding:14px 14px;position:relative;z-index:1;animation:fadeIn .2s ease}
    .page.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    .tabs{
      position:fixed;bottom:0;left:0;right:0;display:flex;
      background:rgba(8,11,20,.88);border-top:1px solid var(--border);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      padding-bottom:env(safe-area-inset-bottom);z-index:200;
    }
    .tab{
      flex:1;border:none;background:transparent;color:var(--muted);
      padding:9px 4px 7px;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;gap:3px;
      font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
      transition:color .15s;user-select:none;
    }
    .tab-ico{font-size:20px;line-height:1}
    .tab.active{color:var(--accent)}

    /* ── Section label ── */
    .slabel{
      font-size:10px;font-weight:700;letter-spacing:1.2px;
      text-transform:uppercase;color:var(--muted);margin:0 0 8px 2px;
    }

    /* ── Card ── */
    .card{
      background:var(--card);border:1px solid var(--border);
      border-radius:var(--r);overflow:hidden;margin-bottom:12px;
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    }
    .card-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 15px 0}
    .card-title{font-size:13px;font-weight:700}
    .card-body{padding:13px 15px}
    .div{height:1px;background:var(--border);margin:0 15px}

    /* ── Buttons ── */
    .grid{display:grid;gap:8px}
    .g2{grid-template-columns:1fr 1fr}
    .g3{grid-template-columns:1fr 1fr 1fr}
    .g4{grid-template-columns:1fr 1fr 1fr 1fr}

    .btn{
      border:none;cursor:pointer;border-radius:12px;padding:12px 8px;
      font-size:11px;font-weight:700;color:var(--text);
      background:rgba(255,255,255,.05);border:1px solid var(--border);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:5px;min-height:62px;user-select:none;text-align:center;line-height:1.2;
      transition:transform .12s,background .12s,border-color .12s;
    }
    .btn:active{transform:scale(.95)}
    .btn .bi{font-size:20px;line-height:1}

    .btn.accent{border-color:rgba(124,110,250,.4);background:rgba(124,110,250,.12)}
    .btn.accent:active{background:rgba(124,110,250,.22)}
    .btn.blue{border-color:rgba(90,175,255,.4);background:rgba(90,175,255,.12)}
    .btn.blue:active{background:rgba(90,175,255,.22)}
    .btn.danger{border-color:rgba(255,77,109,.4);background:rgba(255,77,109,.10)}
    .btn.danger:active{background:rgba(255,77,109,.20)}
    .btn.warn{border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.10)}
    .btn.warn:active{background:rgba(251,191,36,.20)}
    .btn.ok{border-color:rgba(52,211,153,.4);background:rgba(52,211,153,.10)}
    .btn.ok:active{background:rgba(52,211,153,.20)}

    .brow{
      width:100%;border:none;cursor:pointer;border-radius:12px;padding:12px 14px;
      font-size:13px;font-weight:700;color:var(--text);
      background:rgba(255,255,255,.05);border:1px solid var(--border);
      display:flex;align-items:center;gap:10px;user-select:none;
      transition:transform .12s,background .12s;margin-bottom:8px;
    }
    .brow:last-child{margin-bottom:0}
    .brow:active{transform:scale(.98);background:rgba(255,255,255,.09)}
    .brow .bri{font-size:17px;flex-shrink:0}
    .brow .brt{flex:1;text-align:left}
    .brow .bra{color:var(--muted);font-size:14px}
    .brow.ok{border-color:rgba(52,211,153,.4);background:rgba(52,211,153,.10)}
    .brow.danger{border-color:rgba(255,77,109,.4);background:rgba(255,77,109,.10)}
    .brow.accent{border-color:rgba(124,110,250,.4);background:rgba(124,110,250,.12)}
    .brow.blue{border-color:rgba(90,175,255,.4);background:rgba(90,175,255,.12)}

    .bprim{
      width:100%;border:none;cursor:pointer;border-radius:12px;padding:14px;
      font-size:14px;font-weight:800;color:#fff;
      background:linear-gradient(135deg,#7C6EFA,#5AAFFF);
      box-shadow:0 8px 28px rgba(124,110,250,.35);
      transition:transform .12s,box-shadow .12s;
    }
    .bprim:active{transform:scale(.97);box-shadow:0 4px 14px rgba(124,110,250,.25)}

    /* ── Inputs ── */
    .inp,.ta,.sel{
      width:100%;border:1px solid var(--border);background:rgba(255,255,255,.04);
      color:var(--text);border-radius:12px;padding:11px 13px;
      outline:none;font-size:13px;font-weight:600;transition:border-color .15s;
    }
    .inp:focus,.ta:focus,.sel:focus{border-color:var(--accent)}
    .ta{min-height:76px;resize:none}
    .inp::placeholder,.ta::placeholder{color:var(--muted);font-weight:500}
    .sel option{background:#0E1220}
    .flabel{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .row{display:flex;gap:8px;align-items:center}
    .row .inp{flex:1}
    .mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}

    /* ── Volume ── */
    .vol-wrap{text-align:center;padding:6px 0 2px}
    .vol-num{
      font-size:54px;font-weight:900;letter-spacing:-3px;line-height:1;
      background:linear-gradient(135deg,#A78BFA,#60A5FA);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .vol-sub{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-top:2px}
    input[type=range]{
      -webkit-appearance:none;width:100%;height:4px;border-radius:999px;
      background:rgba(255,255,255,.1);outline:none;margin:12px 0;
    }
    input[type=range]::-webkit-slider-thumb{
      -webkit-appearance:none;width:22px;height:22px;border-radius:50%;
      background:linear-gradient(135deg,#7C6EFA,#5AAFFF);
      box-shadow:0 0 18px rgba(124,110,250,.6);cursor:pointer;
      border:2px solid rgba(255,255,255,.25);
    }
    .qvol{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
    .qvol button{
      border:1px solid var(--border);background:rgba(255,255,255,.04);
      color:var(--muted);border-radius:10px;padding:8px 4px;
      font-size:12px;font-weight:700;cursor:pointer;transition:.12s;
    }
    .qvol button:active{background:rgba(255,255,255,.10);color:var(--text)}

    /* ── Stats ── */
    .stat-list{display:flex;flex-direction:column}
    .stat-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 15px;border-bottom:1px solid var(--border);
    }
    .stat-row:last-child{border-bottom:none}
    .stat-k{font-size:12px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:8px}
    .stat-ico{width:26px;height:26px;border-radius:8px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:13px}
    .stat-v{font-size:12px;font-weight:700;color:var(--text)}

    /* ── Log ── */
    .log-list{display:flex;flex-direction:column}
    .log-item{display:flex;align-items:flex-start;gap:10px;padding:10px 15px;border-bottom:1px solid var(--border)}
    .log-item:last-child{border-bottom:none}
    .ldot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}
    .ldot.ok{background:var(--ok);box-shadow:0 0 6px var(--ok)}
    .ldot.err{background:var(--danger);box-shadow:0 0 6px var(--danger)}
    .lbody{flex:1;min-width:0}
    .lcmd{font-size:12px;font-weight:700}
    .lmsg{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.35;word-break:break-word}
    .ltime{font-size:10px;color:var(--muted);flex-shrink:0;margin-top:3px}

    /* ── Gallery ── */
    .gallery{
      display:flex;gap:8px;overflow-x:auto;padding:0 15px 14px;
      scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
    }
    .gallery::-webkit-scrollbar{display:none}
    .thumb{
      min-width:120px;height:84px;border-radius:12px;
      border:1px solid var(--border);background:rgba(255,255,255,.04);
      position:relative;overflow:hidden;scroll-snap-align:start;
      cursor:pointer;flex-shrink:0;transition:transform .12s;
    }
    .thumb:active{transform:scale(.97)}
    .thumb img,.thumb video{width:100%;height:100%;object-fit:cover}
    .thumb-lbl{
      position:absolute;bottom:0;left:0;right:0;padding:5px 7px;
      background:linear-gradient(to top,rgba(0,0,0,.72),transparent);
      font-size:9px;font-weight:700;color:rgba(255,255,255,.9);
    }
    .thumb-play{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:26px;height:26px;border-radius:50%;
      background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);
      display:flex;align-items:center;justify-content:center;font-size:11px;
    }

    /* ── File Browser ── */
    .fb-path{
      font-size:11px;font-weight:700;color:var(--muted);
      padding:10px 15px 0;word-break:break-all;
    }
    .fb-list{display:flex;flex-direction:column}
    .fb-item{
      display:flex;align-items:center;gap:10px;padding:10px 15px;
      border-bottom:1px solid var(--border);cursor:pointer;
      transition:background .12s;user-select:none;
    }
    .fb-item:last-child{border-bottom:none}
    .fb-item:active{background:rgba(255,255,255,.05)}
    .fb-ico{font-size:20px;flex-shrink:0;width:32px;text-align:center}
    .fb-body{flex:1;min-width:0}
    .fb-name{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .fb-meta{font-size:10px;color:var(--muted);margin-top:2px}
    .fb-arrow{color:var(--muted);font-size:14px;flex-shrink:0}
    .fb-toolbar{
      display:flex;gap:8px;padding:10px 15px;
      border-bottom:1px solid var(--border);flex-wrap:wrap;
    }
    .fb-tbtn{
      padding:6px 12px;border-radius:8px;border:1px solid var(--border);
      background:rgba(255,255,255,.04);font-size:11px;font-weight:700;
      color:var(--text);cursor:pointer;transition:.12s;
    }
    .fb-tbtn:active{background:rgba(255,255,255,.09)}
    .fb-tbtn.danger{border-color:rgba(255,77,109,.4);color:var(--danger)}
    .fb-tbtn.ok{border-color:rgba(52,211,153,.4);color:var(--ok)}
    .fb-empty{padding:28px 15px;text-align:center;color:var(--muted);font-size:12px;font-weight:600}
    .fb-search{padding:10px 15px;border-bottom:1px solid var(--border)}
    .fb-sel{background:rgba(124,110,250,.12);border-color:rgba(124,110,250,.4)!important}

    /* ── Lock chip ── */
    .lock-chip{
      display:inline-flex;align-items:center;gap:6px;padding:4px 9px;
      border-radius:999px;font-size:11px;font-weight:700;
      border:1px solid var(--border);background:rgba(255,255,255,.04);
    }

    /* ── Toast ── */
    .toast{
      position:fixed;bottom:82px;left:50%;
      transform:translateX(-50%) translateY(12px);
      opacity:0;pointer-events:none;transition:.2s ease;z-index:999;
      max-width:calc(100vw - 28px);
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .tbox{
      padding:9px 15px;border-radius:999px;
      background:rgba(12,16,28,.95);border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(20px);font-size:12px;font-weight:700;color:var(--text);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      box-shadow:0 14px 40px rgba(0,0,0,.5);
    }

    /* ── Sheet ── */
    .sbg{
      position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
      display:none;align-items:flex-end;z-index:500;
    }
    .sbg.open{display:flex}
    .sheet{
      width:100%;background:rgba(10,14,26,.97);
      border:1px solid rgba(255,255,255,.1);border-bottom:none;
      border-top-left-radius:24px;border-top-right-radius:24px;
      box-shadow:0 -24px 80px rgba(0,0,0,.6);
      padding:0 0 28px;
      animation:sup .22s cubic-bezier(.16,1,.3,1);
    }
    @keyframes sup{from{transform:translateY(40px);opacity:.5}to{transform:translateY(0);opacity:1}}
    .shandle{width:36px;height:4px;border-radius:99px;background:rgba(255,255,255,.15);margin:13px auto 0}
    .shdr{padding:14px 18px 10px}
    .stitle{font-size:17px;font-weight:800;letter-spacing:-.3px}
    .sdesc{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.4}
    .sbody{padding:0 15px}
    .sbody>*+*{margin-top:10px}
    .sacts{display:flex;gap:8px;padding:14px 15px 0;flex-wrap:wrap}
    .sacts .btn{flex:1;min-width:100px;min-height:46px}

    /* ── Record overlay ── */
    .rec-overlay{
      position:fixed;inset:0;z-index:900;
      background:rgba(8,11,20,.96);backdrop-filter:blur(16px);
      display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;
    }
    .rec-overlay.show{display:flex;animation:fadeIn .3s ease}
    .rec-pulse{
      width:80px;height:80px;border-radius:50%;
      background:rgba(255,77,109,.15);border:2px solid var(--danger);
      display:flex;align-items:center;justify-content:center;font-size:32px;
      animation:pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,77,109,.5)}50%{box-shadow:0 0 0 18px rgba(255,77,109,0)}}
    .rec-title{font-size:20px;font-weight:800;letter-spacing:-.3px}
    .rec-sub{font-size:13px;color:var(--muted);font-weight:600}
    .rec-timer{
      font-size:52px;font-weight:900;letter-spacing:-2px;line-height:1;
      font-variant-numeric:tabular-nums;
      background:linear-gradient(135deg,#FF4D6D,#FF8C69);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .rec-bar-wrap{width:220px;height:4px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden}
    .rec-bar{height:100%;border-radius:99px;background:var(--danger);width:100%;transition:width 1s linear}

    /* ── Viewer ── */
    .viewer{border-radius:14px;overflow:auto;background:rgba(0,0,0,.3);max-height:55vh;touch-action:pan-x pan-y pinch-zoom;border:1px solid var(--border)}
    .viewer img,.viewer video{width:100%;height:auto;display:block}

    /* ── Chip ── */
    .chip{
      display:inline-flex;align-items:center;gap:4px;padding:3px 8px;
      border-radius:999px;font-size:10px;font-weight:700;
      border:1px solid var(--border);background:rgba(255,255,255,.04);
      color:var(--muted);cursor:pointer;user-select:none;transition:.12s;
    }
    .chip:active{background:rgba(255,255,255,.10)}

    pre.code{
      font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
      font-size:11px;line-height:1.6;color:var(--text);
      white-space:pre-wrap;word-break:break-word;background:transparent;
    }

    /* ── Rename input in sheet ── */
    .empty{padding:28px 15px;text-align:center;color:var(--muted);font-size:12px;font-weight:600}
    .empty-ico{font-size:30px;margin-bottom:8px;opacity:.4}
  </style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="logo">Cortex</div>
  <div class="hdr-right">
    <div class="sdot" id="dot"></div>
    <span class="stxt" id="stxt">…</span>
    <div class="ibtn" onclick="openSettings()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </div>
  </div>
</div>

<!-- Dynamic pages (generated by JS from /api/features) -->
<div id="pages"></div>

<!-- Static: Files page -->
<div class="page" id="page-files">
  <div class="slabel">Файловый менеджер</div>
  <div class="card" id="fbCard">
    <div class="fb-path" id="fbPath">Загрузка…</div>
    <div class="fb-search">
      <input class="inp" id="fbSearch" placeholder="🔍 Поиск…" oninput="fbFilter(this.value)" />
    </div>
    <div class="fb-toolbar" id="fbToolbar"></div>
    <div class="fb-list" id="fbList"></div>
    <div class="empty" id="fbEmpty" style="display:none">
      <div class="empty-ico">📂</div>Папка пуста
    </div>
  </div>

  <!-- Log -->
  <div class="slabel">Последние действия</div>
  <div class="card">
    <div class="card-hdr">
      <div class="card-title">Лог</div>
      <span class="chip" onclick="clearLog()">Очистить</span>
    </div>
    <div style="height:10px"></div>
    <div class="log-list" id="logList2"></div>
    <div class="empty" id="logEmpty2" style="display:none">
      <div class="empty-ico">📋</div>Пусто
    </div>
  </div>
</div>

<!-- Tabs (generated) -->
<div class="tabs" id="tabs"></div>

<!-- Toast -->
<div class="toast" id="toast"><div class="tbox" id="tbox"></div></div>

<!-- Sheet -->
<div class="sbg" id="sbg" onclick="sbgClick(event)">
  <div class="sheet">
    <div class="shandle"></div>
    <div class="shdr">
      <div class="stitle" id="stitle"></div>
      <div class="sdesc"  id="sdesc"></div>
    </div>
    <div class="sbody" id="sbody"></div>
    <div class="sacts" id="sacts"></div>
  </div>
</div>

<div class="rec-overlay" id="recOverlay">

<script>
// ══════════════════════════════════════
//  Core
// ══════════════════════════════════════
const tg = window.Telegram?.WebApp;
const params = new URLSearchParams(location.search);
let API_BASE = (params.get("api") || localStorage.getItem("api_base") || "").trim().replace(/\/$/,"");
if (API_BASE) localStorage.setItem("api_base", API_BASE);
const inTG = !!(tg?.initData);
if (inTG) { tg.ready(); tg.expand(); }

const esc = s => String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ── Toast ──
let _tt = null;
function toast(msg, ms=2800){
  document.getElementById("tbox").textContent = msg;
  const el = document.getElementById("toast");
  el.classList.add("show");
  clearTimeout(_tt);
  _tt = setTimeout(()=>el.classList.remove("show"), ms);
}

// ── Sheet ──
function openSheet({title="",desc="",bodyHtml="",actions=[]}){
  document.getElementById("stitle").textContent = title;
  document.getElementById("sdesc").textContent  = desc;
  document.getElementById("sbody").innerHTML    = bodyHtml;
  const a = document.getElementById("sacts");
  a.innerHTML = "";
  actions.forEach(x=>{
    const b = document.createElement("button");
    b.className = "btn "+(x.kind||"blue");
    b.textContent = x.text||"OK";
    b.onclick = x.onClick||closeSheet;
    a.appendChild(b);
  });
  document.getElementById("sbg").classList.add("open");
}
function closeSheet(){ document.getElementById("sbg").classList.remove("open"); }
function sbgClick(e){ if(e.target.id==="sbg") closeSheet(); }

async function copyText(s){
  try{ await navigator.clipboard.writeText(s); toast("✅ Скопировано",1400); }
  catch{ toast("❌ Ошибка копирования"); }
}

// ── API ──
async function apiPost(path, payload){
  if (!API_BASE) throw new Error("API URL не задан");
  const h = {"Content-Type":"application/json"};
  if (tg?.initData) h["X-Tg-Init-Data"] = tg.initData;
  const r = await fetch(API_BASE+path, {method:"POST",headers:h,body:JSON.stringify(payload||{})});
  let data = null;
  try{ data = await r.json(); } catch{}
  if (!r.ok) throw new Error(data?.message||"HTTP "+r.status);
  return data;
}

// ── Log ──
const LOG_KEY = "cortex_log_v4";
let logItems = [];
function loadLog(){ try{ logItems=JSON.parse(localStorage.getItem(LOG_KEY)||"[]"); }catch{ logItems=[]; } renderLog(); }
function saveLog(){ localStorage.setItem(LOG_KEY, JSON.stringify(logItems.slice(0,40))); }
function addLog({cmd,ok,message}){
  logItems.unshift({t:Date.now(),cmd,ok:!!ok,message:String(message||"")});
  logItems = logItems.slice(0,40); saveLog(); renderLog();
}
function clearLog(){ logItems=[]; saveLog(); renderLog(); }
function renderLog(){
  ["logList","logList2"].forEach(id=>{
    const list  = document.getElementById(id);
    const empty = document.getElementById(id==="logList"?"logEmpty":"logEmpty2");
    if (!list) return;
    if (!logItems.length){ list.innerHTML=""; if(empty) empty.style.display="block"; return; }
    if(empty) empty.style.display="none";
    list.innerHTML = "";
    for(const it of logItems){
      const t = new Date(it.t).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"});
      const d = document.createElement("div");
      d.className="log-item";
      d.innerHTML=`<div class="ldot ${it.ok?"ok":"err"}"></div><div class="lbody"><div class="lcmd">${esc(it.cmd)}</div><div class="lmsg">${esc(it.message).slice(0,200)}</div></div><div class="ltime">${t}</div>`;
      list.appendChild(d);
    }
  });
}

// ── Captures ──
const CAP_KEY = "cortex_caps_v4";
let captures = [];
function loadCaps(){ try{ captures=JSON.parse(sessionStorage.getItem(CAP_KEY)||"[]"); }catch{ captures=[]; } renderCaps(); }
function saveCaps(){ sessionStorage.setItem(CAP_KEY, JSON.stringify(captures.slice(0,30))); }
function clearCaptures(){ captures=[]; saveCaps(); renderCaps(); toast("Галерея очищена"); }
function addCapture(cap){ captures.unshift(cap); captures=captures.slice(0,30); saveCaps(); renderCaps(); }
function renderCaps(){
  const g     = document.getElementById("gallery");
  const empty = document.getElementById("galEmpty");
  if (!g) return;
  if (!captures.length){ g.innerHTML=""; if(empty) empty.style.display="block"; return; }
  if(empty) empty.style.display="none";
  g.innerHTML="";
  for(const c of captures){
    const div=document.createElement("div"); div.className="thumb";
    const lbl = c.kind==="screenshot"?"Скрин":c.kind==="camera_photo"?"Камера":"Видео";
    const t   = new Date(c.t).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    if (c.type==="image"){
      div.innerHTML=`<img src="data:${c.mime};base64,${c.b64}"/><div class="thumb-lbl">${lbl} · ${t}</div>`;
      div.onclick=()=>openImgViewer(c);
    } else {
      div.innerHTML=`<div style="height:100%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04)"><div class="thumb-play">▶</div></div><div class="thumb-lbl">${lbl} · ${t}</div>`;
      div.onclick=()=>openFileViewer(c);
    }
    g.appendChild(div);
  }
}

async function dlB64({b64,mime,filename}){
  const bin=atob(b64),bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  const url=URL.createObjectURL(new Blob([bytes],{type:mime}));
  const a=Object.assign(document.createElement("a"),{href:url,download:filename||"file"});
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}
function openImgViewer(c){
  openSheet({title:c.kind==="screenshot"?"Скриншот":"Фото",desc:new Date(c.t).toLocaleString(),
    bodyHtml:`<div class="viewer"><img src="data:${c.mime};base64,${c.b64}"/></div>`,
    actions:[{text:"💾 Скачать",kind:"ok",onClick:async()=>{ await dlB64(c); }},{text:"Закрыть",kind:"accent",onClick:closeSheet}]});
}
function openFileViewer(c){
  const isVid=(c.mime||"").includes("video");
  openSheet({title:c.filename||"Файл",desc:c.url||"",
    bodyHtml:`${isVid?`<div class="viewer"><video controls src="${c.url}"></video></div>`:""}<div style="font-size:11px;color:var(--muted);word-break:break-all;margin-top:8px">${esc(c.url||"")}</div>`,
    actions:[{text:"⬇ Скачать",kind:"ok",onClick:()=>window.open(c.url,"_blank")},{text:"📋 Копировать",kind:"blue",onClick:async()=>{ await copyText(c.url||""); }},{text:"Закрыть",kind:"accent",onClick:closeSheet}]});
}

// ══════════════════════════════════════
//  execCmd
// ══════════════════════════════════════
async function execCmd(cmd, extra={}){
  toast("⏳ "+cmd);
  try{
    const res = await apiPost("/api/exec",{cmd,...extra});
    const ok=!!res.ok, msg=res.message||(ok?"OK":"Error");
    addLog({cmd,ok,message:msg});
    toast((ok?"✅ ":"❌ ")+msg, 3500);
    const d=res.data;
    if (d?.type==="text"&&d.text){
      openSheet({title:cmd,desc:msg,
        bodyHtml:`<pre class="code">${esc(d.text)}</pre>`,
        actions:[{text:"📋 Копировать",kind:"ok",onClick:async()=>{ await copyText(d.text); }},{text:"Закрыть",kind:"accent",onClick:closeSheet}]});
    }
    if (d?.type==="image"&&d.b64&&d.mime){
      const cap={t:Date.now(),kind:cmd,type:"image",mime:d.mime,b64:d.b64,filename:`${cmd}_${Date.now()}.jpg`};
      addCapture(cap); openImgViewer(cap);
    }
    if (d?.type==="file"&&d.url){
      const cap={t:Date.now(),kind:cmd,type:"file",url:API_BASE+d.url,filename:d.filename||"file",mime:d.mime||"",size:d.size||0};
      addCapture(cap); openFileViewer(cap);
    }
    return res;
  }catch(e){
    addLog({cmd,ok:false,message:e?.message||"Ошибка"});
    toast("❌ "+(e?.message||"Ошибка"),5000);
    return null;
  }
}

function confirmAction(cmd,title){
  openSheet({title,desc:"Это может привести к потере несохранённых данных.",
    actions:[{text:"Отмена",kind:"accent",onClick:closeSheet},{text:"✅ Подтвердить",kind:"danger",onClick:async()=>{ closeSheet(); await execCmd(cmd); }}]});
}

// ══════════════════════════════════════
//  Volume
// ══════════════════════════════════════
function volPreview(v){
  const el=document.getElementById("volNum");
  if(el) el.textContent=v;
  const r=document.getElementById("volRange");
  if(r) r.style.background=`linear-gradient(to right,var(--accent) ${v}%,rgba(255,255,255,.1) ${v}%)`;
}
async function setVolume(v){ v=Number(v); document.getElementById("volRange").value=v; volPreview(v); await execCmd("volume:"+v); }

// ══════════════════════════════════════
//  Keys
// ══════════════════════════════════════
async function pressKey(){ await execCmd("key:"+document.getElementById("keySelect").value); }
async function typeText(){
  const t=(document.getElementById("typeText")?.value||"").trim();
  if(!t){ toast("❌ Введи текст"); return; }
  await execCmd("type:"+t);
  document.getElementById("typeText").value="";
}

// ══════════════════════════════════════
//  Timer
// ══════════════════════════════════════
async function startTimer(){
  const v=Number(document.getElementById("timerMin")?.value||0);
  if(!v||v<1||v>1440){ toast("❌ Введи минуты 1..1440",3000); return; }
  await execCmd("timer_start_menu",{minutes:v});
}

// ══════════════════════════════════════
//  Record + Overlay
// ══════════════════════════════════════
let _recInterval=null;
function showRecOverlay(title,icon,seconds){
  document.getElementById("recTitle").textContent = title;
  document.getElementById("recIcon").textContent  = icon;
  document.getElementById("recSub").textContent   = seconds+" сек";
  document.getElementById("recTimer").textContent = String(seconds).padStart(2,"0");
  document.getElementById("recBar").style.width   = "100%";
  document.getElementById("recOverlay").classList.add("show");

  let left = seconds;
  _recInterval = setInterval(()=>{
    left--;
    document.getElementById("recTimer").textContent = String(left).padStart(2,"0");
    const pct = (left/seconds)*100;
    document.getElementById("recBar").style.width = pct+"%";
    if (left<=0){ clearInterval(_recInterval); hideRecOverlay(); }
  },1000);
}
function hideRecOverlay(){
  clearInterval(_recInterval);
  document.getElementById("recOverlay").classList.remove("show");
}

function openRecordPicker(kind){
  const cmd   = kind==="screen"?"record_start_buttons":"camera_record";
  const title = kind==="screen"?"🎥 Запись экрана":"🎬 Запись с камеры";
  const icon  = kind==="screen"?"🎥":"🎬";
  openSheet({
    title, desc:"Выбери длительность",
    bodyHtml:`
      <div class="grid g4" style="margin-bottom:10px">
        ${[5,10,15,30].map(s=>`<button class="btn ok" onclick="startRecord('${cmd}','${title}','${icon}',${s})"><span class="bi">▶</span>${s}с</button>`).join("")}
      </div>
      <div class="grid g3">
        ${[45,60,90].map(s=>`<button class="btn blue" onclick="startRecord('${cmd}','${title}','${icon}',${s})"><span class="bi">▶</span>${s}с</button>`).join("")}
      </div>
      <div class="mt12"></div>
      <div class="flabel">Своё (1..120 сек)</div>
      <div class="row">
        <input class="inp" id="customSec" type="number" min="1" max="120" placeholder="Секунды"/>
        <button class="btn accent" style="min-width:80px;min-height:44px" onclick="startRecordCustom('${cmd}','${title}','${icon}')">Старт</button>
      </div>
    `,
    actions:[{text:"Закрыть",kind:"accent",onClick:closeSheet}]
  });
}
function startRecordCustom(cmd,title,icon){
  const v=Number(document.getElementById("customSec")?.value||0);
  if(!v||v<1||v>120){ toast("❌ Секунды 1..120"); return; }
  startRecord(cmd,title,icon,v);
}
async function startRecord(cmd,title,icon,seconds){
  closeSheet();
  showRecOverlay(title,icon,seconds);
  const res = await execCmd(cmd,{seconds});
  hideRecOverlay();
  if (!res) return;
}

// ══════════════════════════════════════
//  System info
// ══════════════════════════════════════
async function updateInfo(showToast=false){
  try{
    const res=await apiPost("/api/info",{});
    const d=res.data||{};
    const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v||"—"; };
    set("publicIp",d.public_ip); set("localIp",d.local_ip);
    set("cpuVal",d.cpu_percent!=null?d.cpu_percent.toFixed(1)+"%":null);
    set("ramVal",d.ram); set("diskVal",d.disk_c); set("uptimeVal",d.uptime);
    setOnline(true);
    if(showToast) toast("✅ Обновлено",1600);
  }catch(e){
    setOnline(false);
    if(showToast) toast("❌ "+(e?.message||"error"),4000);
  }
}
function setOnline(on){
  document.getElementById("dot").classList.toggle("on",on);
  document.getElementById("stxt").textContent = on?(inTG?"Telegram · online":"online"):"offline";
}

// ══════════════════════════════════════
//  WinLock
// ══════════════════════════════════════
async function winlockRefresh(){
  try{
    const res=await apiPost("/api/winlock",{op:"status"});
    const locked=!!(res.data?.value?.locked);
    const dot=document.getElementById("wlDot");
    const txt=document.getElementById("wlStatus");
    if(dot) dot.classList.toggle("on",!locked);
    if(txt) txt.textContent=locked?"Заблокировано":"Разблокировано";
  }catch{}
}
async function winlockUnlock(){ await execCmd("winlock_unlock"); winlockRefresh(); }
function openWinlockSheet(){
  openSheet({
    title:"🔒 WinLock",desc:"Настройте блокировку",
    bodyHtml:`
      <div class="flabel">Сообщение на экране</div>
      <input class="inp" id="wlMsg" placeholder="Необязательно"/>
      <div class="flabel mt12">Тип</div>
      <select class="sel" id="wlType" onchange="wlTypeChange()">
        <option value="remote">📱 Только через Telegram</option>
        <option value="password">🔑 С паролем</option>
      </select>
      <div id="wlPwWrap" style="display:none" class="mt12">
        <div class="flabel">Пароль (мин. 4 символа)</div>
        <input class="inp" id="wlPw" placeholder="Пароль"/>
      </div>
      <div class="flabel mt12">Озвучка</div>
      <select class="sel" id="wlVoice">
        <option value="0">🔇 Без</option>
        <option value="1">🔊 С озвучкой</option>
      </select>
    `,
    actions:[{text:"Отмена",kind:"accent",onClick:closeSheet},{text:"🔒 Заблокировать",kind:"danger",onClick:doWinlockLock}]
  });
}
function wlTypeChange(){
  const sel=document.getElementById("wlType");
  const wr=document.getElementById("wlPwWrap");
  if(wr) wr.style.display=sel?.value==="password"?"block":"none";
}
async function doWinlockLock(){
  const msg=document.getElementById("wlMsg")?.value?.trim()||"";
  const lt=document.getElementById("wlType")?.value||"remote";
  const pw=document.getElementById("wlPw")?.value?.trim()||"";
  const vo=document.getElementById("wlVoice")?.value==="1";
  if(lt==="password"&&pw.length<4){ toast("❌ Пароль мин. 4 символа",3000); return; }
  closeSheet();
  const res=await apiPost("/api/exec",{cmd:"winlock_lock",message:msg,lock_type:lt,password:pw,voice:vo});
  const ok=!!res?.ok,m=res?.message||(ok?"OK":"Ошибка");
  addLog({cmd:"winlock_lock",ok,message:m});
  toast((ok?"✅ ":"❌ ")+m,3000);
  winlockRefresh();
}

// ══════════════════════════════════════
//  File Browser
// ══════════════════════════════════════
let fbData = {path:"drives", items:[]};
let fbSelected = new Set();
let fbSearch = "";

async function fbNavigate(path){
  try{
    const res=await apiPost("/api/browse",{path});
    if(!res.ok) throw new Error(res.message);
    const d=res.data;
    fbData={path:d.path, items:d.items};
    fbSelected.clear();
    fbSearch="";
    const si=document.getElementById("fbSearch");
    if(si) si.value="";
    renderFB();
  }catch(e){
    toast("❌ "+e.message,4000);
  }
}

function fbFilter(q){
  fbSearch=q.toLowerCase();
  renderFB();
}

function renderFB(){
  const items = fbData.items.filter(i=>!fbSearch||i.name.toLowerCase().includes(fbSearch));
  const pathEl=document.getElementById("fbPath");
  const toolbar=document.getElementById("fbToolbar");
  const list=document.getElementById("fbList");
  const empty=document.getElementById("fbEmpty");
  if(!list) return;

  // Path
  if(pathEl){
    pathEl.textContent = fbData.path==="drives" ? "💿 Диски" : fbData.path;
  }

  // Toolbar
  if(toolbar){
    const hasSel = fbSelected.size>0;
    toolbar.innerHTML=`
      ${fbData.path!=="drives"?`<button class="fb-tbtn" onclick="fbUp()">⬆️ Вверх</button>`:""}
      <button class="fb-tbtn" onclick="fbNavigate('drives')">💿 Диски</button>
      <button class="fb-tbtn" onclick="fbMkdir()">📁 Новая папка</button>
      ${hasSel?`
        <button class="fb-tbtn ok" onclick="fbDownloadSel()">⬇ Скачать</button>
        <button class="fb-tbtn" onclick="fbZipSel()">📦 ZIP</button>
        <button class="fb-tbtn danger" onclick="fbDeleteSel()">🗑 Удалить</button>
      `:""}
    `;
  }

  // List
  list.innerHTML="";
  if(!items.length){ empty.style.display="block"; return; }
  empty.style.display="none";

  for(const item of items){
    const isSel = fbSelected.has(item.path);
    const div=document.createElement("div");
    div.className="fb-item"+(isSel?" fb-sel":"");
    div.innerHTML=`
      <div class="fb-ico">${item.is_dir?"📁":"📄"}</div>
      <div class="fb-body">
        <div class="fb-name">${esc(item.name)}</div>
        <div class="fb-meta">${esc(item.meta||"")}${item.modified?" · "+esc(item.modified):""}</div>
      </div>
      <div class="fb-arrow">›</div>
    `;
    div.onclick = ()=>{ if(item.is_dir) fbNavigate(item.path); else fbOpenFile(item); };
    div.oncontextmenu = (e)=>{ e.preventDefault(); fbToggleSel(item.path); };
    // Long press → select
    let pressTimer;
    div.addEventListener("touchstart",()=>{ pressTimer=setTimeout(()=>fbToggleSel(item.path),500); });
    div.addEventListener("touchend",()=>clearTimeout(pressTimer));
    list.appendChild(div);
  }
}

function fbToggleSel(path){
  if(fbSelected.has(path)) fbSelected.delete(path);
  else fbSelected.add(path);
  renderFB();
  toast(fbSelected.size>0?`Выбрано: ${fbSelected.size}`:"Выбор снят",1200);
}

function fbUp(){
  if(fbData.path==="drives"||!fbData.path) return fbNavigate("drives");
  const parent = fbData.path.replace(/[/\\][^/\\]+$|[/\\]$/,"");
  if(!parent||parent===fbData.path) return fbNavigate("drives");
  fbNavigate(parent);
}

function fbOpenFile(item){
  openSheet({
    title:item.name, desc:item.meta||"",
    bodyHtml:`<div class="flabel">Путь</div><div style="font-size:11px;color:var(--muted);word-break:break-all">${esc(item.path)}</div>`,
    actions:[
      {text:"⬇ Скачать",  kind:"ok",     onClick:()=>{ closeSheet(); fbDownloadFile(item.path); }},
      {text:"📦 ZIP",      kind:"blue",   onClick:()=>{ closeSheet(); fbZipFile(item.path); }},
      {text:"✏️ Переим.", kind:"accent",  onClick:()=>{ closeSheet(); fbRenamePrompt(item.path,item.name); }},
      {text:"🗑 Удалить", kind:"danger",  onClick:()=>{ closeSheet(); fbDeleteFile(item.path); }},
    ]
  });
}

async function fbDownloadFile(path){
  const res=await execCmd("fb_download",{path});
}
async function fbZipFile(path){
  const res=await execCmd("fb_zip",{path});
}
function fbRenamePrompt(path,oldName){
  openSheet({
    title:"Переименовать",desc:oldName,
    bodyHtml:`<div class="flabel">Новое имя</div><input class="inp" id="renameInp" value="${esc(oldName)}"/>`,
    actions:[
      {text:"Отмена",kind:"accent",onClick:closeSheet},
      {text:"✅ OK",kind:"ok",onClick:async()=>{
        const n=document.getElementById("renameInp")?.value?.trim();
        if(!n){ toast("❌ Введи имя"); return; }
        closeSheet();
        await execCmd("fb_rename",{path,new_name:n});
        fbNavigate(fbData.path);
      }}
    ]
  });
}
async function fbDeleteFile(path){
  openSheet({
    title:"Удалить?",desc:path.split(/[/\\]/).pop()||path,
    actions:[
      {text:"Отмена",kind:"accent",onClick:closeSheet},
      {text:"🗑 Удалить",kind:"danger",onClick:async()=>{ closeSheet(); await execCmd("fb_delete",{path}); fbNavigate(fbData.path); }}
    ]
  });
}
async function fbDownloadSel(){
  for(const p of fbSelected) await fbDownloadFile(p);
  fbSelected.clear(); renderFB();
}
async function fbZipSel(){
  if(fbSelected.size===1){
    await fbZipFile([...fbSelected][0]);
  } else {
    toast("ZIP нескольких — выбери по одному",3000);
  }
  fbSelected.clear(); renderFB();
}
function fbDeleteSel(){
  openSheet({
    title:"Удалить выбранное?",desc:`${fbSelected.size} элементов`,
    actions:[
      {text:"Отмена",kind:"accent",onClick:closeSheet},
      {text:"🗑 Удалить",kind:"danger",onClick:async()=>{
        closeSheet();
        for(const p of fbSelected) await execCmd("fb_delete",{path:p});
        fbSelected.clear(); fbNavigate(fbData.path);
      }}
    ]
  });
}
function fbMkdir(){
  openSheet({
    title:"Новая папка",desc:fbData.path,
    bodyHtml:`<div class="flabel">Название</div><input class="inp" id="mkdirInp" placeholder="Имя папки"/>`,
    actions:[
      {text:"Отмена",kind:"accent",onClick:closeSheet},
      {text:"✅ Создать",kind:"ok",onClick:async()=>{
        const n=document.getElementById("mkdirInp")?.value?.trim();
        if(!n){ toast("❌ Введи название"); return; }
        closeSheet();
        await execCmd("fb_mkdir",{path:fbData.path,name:n});
        fbNavigate(fbData.path);
      }}
    ]
  });
}

// ══════════════════════════════════════
//  Settings
// ══════════════════════════════════════
function openSettings(){
  const url=location.origin+location.pathname+(API_BASE?"?api="+encodeURIComponent(API_BASE):"");
  openSheet({
    title:"Настройки",desc:"API URL — адрес Cloudflare-туннеля",
    bodyHtml:`
      <div class="flabel">API URL</div>
      <input class="inp" id="apiInp" value="${esc(API_BASE)}" placeholder="https://xxxxx.trycloudflare.com"/>
      <div class="mt8"></div>
      <button class="bprim" onclick="saveApi()">💾 Сохранить</button>
      <div style="font-size:11px;color:var(--muted);margin-top:12px">Ссылка панели:</div>
      <div style="font-size:11px;color:#9cc2ff;word-break:break-all;margin-top:4px">${esc(url)}</div>
      <div class="mt8"></div>
      <button class="brow blue" onclick="copyText('${esc(url)}')"><span class="bri">📋</span><span class="brt">Копировать ссылку</span></button>
    `,
    actions:[{text:"Закрыть",kind:"accent",onClick:closeSheet}]
  });
}
function saveApi(){
  let v=(document.getElementById("apiInp")?.value||"").trim().replace(/\/$/,"");
  if(!v.startsWith("https://")){ toast("❌ Нужен https://",3500); return; }
  API_BASE=v; localStorage.setItem("api_base",API_BASE);
  toast("✅ Сохранено",1800); setOnline(false); closeSheet(); updateInfo(true);
}

// ══════════════════════════════════════
//  Dynamic UI builder from /api/features
// ══════════════════════════════════════
let _manifest = null;

// Tab mapping: которые рендерить динамически (files — статическая)
const STATIC_TABS = ["files"];

function buildUI(manifest){
  _manifest = manifest;
  const tabs   = manifest.tabs || [];
  const pagesEl = document.getElementById("pages");
  const tabsEl  = document.getElementById("tabs");
  pagesEl.innerHTML = "";
  tabsEl.innerHTML  = "";

  const allTabs = [...tabs, {id:"files", label:"Файлы", icon:"📁", sections:[]}];

  allTabs.forEach((tab,i)=>{
    // Tab button
    const btn = document.createElement("button");
    btn.className="tab"+(i===0?" active":"");
    btn.innerHTML=`<span class="tab-ico">${tab.icon}</span>${tab.label}`;
    btn.onclick = ()=>openTab(tab.id, btn);
    tabsEl.appendChild(btn);

    if (STATIC_TABS.includes(tab.id)) return; // files — уже в HTML

    // Page
    const page = document.createElement("div");
    page.className="page"+(i===0?" active":"");
    page.id="page-"+tab.id;

    let html="";
    for(const sec of (tab.sections||[])){
      if(sec.ui_tab) continue; // браузер — отдельная страница
      html+=`<div class="slabel">${esc(sec.label)}</div><div class="card"><div class="card-body">`;
      html+=renderSection(sec);
      html+=`</div></div>`;
    }

    // Спец-блоки per-tab
    if(tab.id==="capture"){
      html=`
        <div class="slabel">Галерея сессии</div>
        <div class="card" style="padding-bottom:0">
          <div class="card-hdr"><div class="card-title">Медиа</div><span class="chip" onclick="clearCaptures()">Очистить</span></div>
          <div style="height:10px"></div>
          <div class="gallery" id="gallery"></div>
          <div class="empty" id="galEmpty"><div class="empty-ico">🖼</div>Нет скриншотов</div>
        </div>
      `+html;
    }

    if(tab.id==="tools"||tab.id==="control"){
      // Лог
      html+=`
        <div class="slabel">Лог</div>
        <div class="card">
          <div class="card-hdr"><div class="card-title">Действия</div><span class="chip" onclick="clearLog()">Очистить</span></div>
          <div style="height:10px"></div>
          <div class="log-list" id="logList"></div>
          <div class="empty" id="logEmpty" style="display:none"><div class="empty-ico">📋</div>Пусто</div>
        </div>
      `;
    }

    if(tab.id==="tools"){
      // System info + WinLock
      html=`
        <div class="slabel">Система</div>
        <div class="card">
          <div class="card-hdr"><div class="card-title">Информация</div><span class="chip" onclick="updateInfo(true)">↻</span></div>
          <div class="stat-list">
            ${[["🌐","Public IP","publicIp"],["🏠","Local IP","localIp"],["🧠","CPU","cpuVal"],["💾","RAM","ramVal"],["💿","Disk C","diskVal"],["⏱","Uptime","uptimeVal"]]
              .map(([ico,k,id])=>`<div class="stat-row"><div class="stat-k"><div class="stat-ico">${ico}</div>${k}</div><div class="stat-v" id="${id}">—</div></div>`).join("")}
          </div>
        </div>
        <div class="slabel">WinLock</div>
        <div class="card">
          <div class="card-hdr">
            <div class="card-title">Блокировка ПК</div>
            <div class="lock-chip"><div class="sdot" id="wlDot"></div><span id="wlStatus">…</span></div>
          </div>
          <div class="card-body">
            <div class="grid g2">
              <button class="btn danger" onclick="openWinlockSheet()"><span class="bi">🔒</span>Заблокировать</button>
              <button class="btn ok" onclick="winlockUnlock()"><span class="bi">🔓</span>Разблокировать</button>
            </div>
          </div>
        </div>
      `+html;
    }

    page.innerHTML=html;
    pagesEl.appendChild(page);
  });

  // Re-init vol
  volPreview(50);
  loadLog();
  loadCaps();
  renderLog();
}

function renderSection(sec){
  const items=sec.items||[];
  if(!items.length) return "";

  // Detect slider
  const sliders = items.filter(i=>i.type==="slider");
  const btns    = items.filter(i=>!i.type||i.type==="button"||i.type==="record_picker"||i.type==="winlock_sheet");
  const keys    = items.filter(i=>i.type==="key_picker");
  const txts    = items.filter(i=>i.type==="text_input");
  const inputs  = items.filter(i=>i.input);

  let html="";

  // Sliders
  for(const s of sliders){
    html+=`
      <div class="vol-wrap"><div class="vol-num" id="volNum">${s.default||50}</div><div class="vol-sub">Percent</div></div>
      <input id="volRange" type="range" min="${s.min||0}" max="${s.max||100}" value="${s.default||50}"
        oninput="volPreview(this.value)" onchange="setVolume(this.value)"/>
      <div class="qvol">
        ${[0,25,50,75,100].map(v=>`<button onclick="setVolume(${v})">${v}</button>`).join("")}
      </div>
      <div style="height:10px"></div>
    `;
  }

  // Regular buttons
  if(btns.length){
    const cols=btns.length<=2?"g2":btns.length===3?"g3":btns.length===4?"g4":"g2";
    html+=`<div class="grid ${cols}">`;
    for(const b of btns){
      const clickFn = b.confirm
        ? `confirmAction('${b.cmd}','${esc(b.label)}?')`
        : b.type==="record_picker"
          ? `openRecordPicker('${b.record_kind}')`
          : b.type==="winlock_sheet"
            ? `openWinlockSheet()`
            : `execCmd('${b.cmd}')`;
      html+=`<button class="btn ${b.kind||"blue"}" onclick="${clickFn}"><span class="bi">${b.icon||""}</span>${esc(b.label)}</button>`;
    }
    html+=`</div>`;
  }

  // Input buttons (timer etc)
  for(const b of inputs){
    const ip=b.input;
    html+=`
      <div style="height:10px"></div>
      <div class="flabel">${esc(b.label)}</div>
      <div class="row">
        <input class="inp" id="${ip.id}" type="${ip.type||'text'}" placeholder="${esc(ip.placeholder||'')}"/>
        <button class="btn blue" style="min-width:88px;min-height:44px" onclick="execCmd('${b.cmd}',{${ip.param}:+document.getElementById('${ip.id}').value})">Старт</button>
      </div>
    `;
  }

  // Key picker
  for(const k of keys){
    html+=`
      <div style="height:10px"></div>
      <div class="flabel">Клавиша / Комбинация</div>
      <div class="row">
        <select class="sel" id="keySelect">
          ${["enter","esc","tab","space","up","down","left","right","ctrl+c","ctrl+v","ctrl+a","ctrl+z","alt+tab","win+d"]
            .map(k=>`<option value="${k}">${k}</option>`).join("")}
        </select>
        <button class="btn ok" style="min-width:88px;min-height:44px" onclick="pressKey()">Отправить</button>
      </div>
    `;
  }

  // Text input
  for(const t of txts){
    html+=`
      <div style="height:10px"></div>
      <div class="flabel">Напечатать текст на ПК</div>
      <textarea class="ta" id="typeText" placeholder="Введите текст…"></textarea>
      <div class="mt8"></div>
      <button class="bprim" onclick="typeText()">⌨️ Напечатать</button>
    `;
  }

  // Raw command (для control tab)
  if(sec.id==="keyboard"){
    html+=`
      <div style="height:10px"></div>
      <div class="flabel">Произвольная команда</div>
      <div class="row">
        <input class="inp" id="rawCmd" placeholder="kill:1234, open:C:\\file.txt"/>
        <button class="btn accent" style="min-width:56px;min-height:44px" onclick="execCmd(document.getElementById('rawCmd').value.trim())">▶</button>
      </div>
    `;
  }

  return html;
}

function openTab(name, el){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  const pg = document.getElementById("page-"+name);
  if(pg) pg.classList.add("active");
  el.classList.add("active");
  if(name==="files") fbNavigate("drives");
}

// ══════════════════════════════════════
//  Boot
// ══════════════════════════════════════
async function boot(){
  setOnline(false);
  if(!API_BASE){
    document.getElementById("stxt").textContent="Нужен API URL";
    // Fallback UI без фич
    buildUI({tabs:[
      {id:"control",label:"Управление",icon:"🎮",sections:[
        {id:"power",label:"Питание",icon:"⏻",items:[
          {cmd:"shutdown",label:"Выключить",icon:"⏻",kind:"danger",confirm:true},
          {cmd:"reboot",label:"Перезагрузка",icon:"↺",kind:"warn",confirm:true},
          {cmd:"lock",label:"Lock",icon:"🔒",kind:"accent"},
          {cmd:"sleep",label:"Сон",icon:"🌙",kind:"blue"},
        ]},
        {id:"keyboard",label:"Клавиатура",icon:"⌨️",items:[
          {cmd:"key:",label:"Клавиша",icon:"⌨️",kind:"blue",type:"key_picker"},
          {cmd:"type:",label:"Напечатать",icon:"📝",kind:"accent",type:"text_input"},
        ]},
      ]},
      {id:"media",label:"Медиа",icon:"🎵",sections:[
        {id:"volume",label:"Громкость",icon:"🔊",items:[
          {cmd:"volume:",label:"Громкость",icon:"🔊",kind:"blue",type:"slider",min:0,max:100,default:50},
          {cmd:"mute_unmute",label:"Mute",icon:"🔇",kind:"warn"},
        ]},
        {id:"player",label:"Плеер",icon:"🎵",items:[
          {cmd:"media_prev",label:"Пред",icon:"⏮",kind:"blue"},
          {cmd:"media_play",label:"Play/Pause",icon:"⏯",kind:"ok"},
          {cmd:"media_next",label:"След",icon:"⏭",kind:"blue"},
        ]},
      ]},
      {id:"capture",label:"Камера",icon:"📷",sections:[
        {id:"capture",label:"Снять",icon:"📸",items:[
          {cmd:"screenshot",label:"Скриншот",icon:"📸",kind:"ok"},
          {cmd:"camera_photo",label:"Фото",icon:"📷",kind:"accent"},
          {cmd:"record_start_buttons",label:"Запись экрана",icon:"🎥",kind:"blue",type:"record_picker",record_kind:"screen"},
          {cmd:"camera_record",label:"Запись камеры",icon:"🎬",kind:"blue",type:"record_picker",record_kind:"camera"},
        ]},
      ]},
      {id:"tools",label:"Ещё",icon:"🛠",sections:[
        {id:"tools",label:"Утилиты",icon:"🛠",items:[
          {cmd:"status",label:"Статус",icon:"💻",kind:"blue"},
          {cmd:"ip",label:"IP",icon:"🌐",kind:"blue"},
          {cmd:"speedtest",label:"Speedtest",icon:"⚡",kind:"accent"},
          {cmd:"disk_cleanup",label:"Очистка",icon:"🧹",kind:"warn"},
        ]},
      ]},
    ]});
    return;
  }

  // Загружаем manifest с сервера
  try{
    const res = await apiPost("/api/features",{});
    if(res.ok && res.data) buildUI(res.data);
    else throw new Error("no manifest");
  }catch{
    // Fallback
    buildUI({tabs:[]});
  }

  updateInfo(false);
  winlockRefresh();
  setInterval(()=>updateInfo(false), 60_000);
  setInterval(()=>winlockRefresh(), 10_000);
}

boot();
</script>
</body>
</html>
